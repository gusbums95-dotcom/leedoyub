<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, initial-scale=0.5" />
  <title>Admin — Lee Doyub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    /* ── Flatpickr overrides ── */
    .flatpickr-calendar {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      border-radius: 0;
      border: 1px solid #ccc;
      box-shadow: none;
    }
    .flatpickr-day.selected,
    .flatpickr-day.selected:hover {
      background: #000;
      border-color: #000;
      border-radius: 0;
    }
    .flatpickr-day:hover {
      border-radius: 0;
      background: #f4f4f4;
    }
    .flatpickr-day.today { border-color: #ccc; }
    .flatpickr-months .flatpickr-month,
    .flatpickr-current-month,
    .flatpickr-weekday { font-family: Arial, Helvetica, sans-serif; font-size: 12px; }
  </style>
  <style>
    * { margin: 0; padding: 0; }
    body {
      font: normal 12px / 1.4em Arial, Helvetica, sans-serif;
      color: #000;
      margin: 8px;
      background: #fff;
    }
    a { color: #00f; }

    /* ── Header ── */
    #page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #f4f4f4;
      margin-bottom: 12px;
    }
    #site-name { font-size: 12px; font-weight: bold; }
    #btn-logout {
      font: normal 12px Arial, Helvetica, sans-serif;
      background: none;
      border: 1px solid #ccc;
      padding: 2px 8px;
      cursor: pointer;
    }
    #btn-logout:hover { background: #f4f4f4; }

    /* ── Login ── */
    #login-section { max-width: 320px; margin: 60px auto 0; }
    #login-section h2 { font-size: 12px; font-weight: bold; margin-bottom: 12px; }
    .field { margin-bottom: 8px; }
    .field label { display: block; margin-bottom: 2px; }
    .field input[type="email"],
    .field input[type="password"] {
      font: normal 12px Arial, Helvetica, sans-serif;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      padding: 3px 5px;
      height: 22px;
    }
    #login-error { color: red; margin-top: 6px; font-size: 11px; }

    /* ── Admin panel ── */
    #admin-section { display: none; }

    /* ── Section headings ── */
    .admin-section-heading {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-top: 1px solid #f4f4f4;
      border-bottom: 1px solid #f4f4f4;
      padding: 2px 0;
      margin-bottom: 10px;
    }
    .admin-section-heading.collapsible { cursor: pointer; user-select: none; }
    .admin-section-wrap { margin-bottom: 24px; }

    /* ── Profile form ── */
    #profile-form .field input[type="text"],
    #profile-form .field textarea {
      font: normal 12px Arial, Helvetica, sans-serif;
      border: 1px solid #ccc;
      padding: 3px 5px;
      box-sizing: border-box;
    }
    #profile-form .field input[type="text"] { width: 320px; height: 22px; }
    #profile-form .field textarea { width: 560px; height: 70px; resize: vertical; }

    /* ── Upcoming list ── */
    #upcoming-list { margin-bottom: 8px; }
    .upcoming-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 4px;
    }
    .upcoming-row input {
      font: normal 12px Arial, Helvetica, sans-serif;
      border: 1px solid #ccc;
      padding: 3px 5px;
      height: 22px;
      box-sizing: border-box;
    }
    .upcoming-row .inp-title     { width: 200px; }
    .upcoming-row .inp-date-from,
    .upcoming-row .inp-date-to   { width: 96px; }
    .upcoming-row .inp-venue     { width: 200px; }

    .btn-small {
      font: normal 11px Arial, Helvetica, sans-serif;
      background: none;
      border: 1px solid #ccc;
      padding: 2px 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-small:hover { background: #f4f4f4; }
    .btn-small.del { color: #900; border-color: #ccc; }
    .btn-small.del:hover { background: #fff0f0; }

    #profile-status { font-size: 11px; color: green; margin-left: 10px; }
    #profile-error  { font-size: 11px; color: red; }

    /* ── Works table ── */
    #btn-add {
      font: normal 12px Arial, Helvetica, sans-serif;
      background: none;
      border: 1px solid #ccc;
      padding: 2px 8px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    #btn-add:hover { background: #f4f4f4; }

    #works-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    #works-table colgroup col.col-title   { width: 30%; }
    #works-table colgroup col.col-medium  { width: auto; }
    #works-table colgroup col.col-size    { width: 120px; }
    #works-table colgroup col.col-year    { width: 55px; }
    #works-table colgroup col.col-actions { width: 100px; }

    #works-table thead tr {
      border-top: 1px solid #f4f4f4;
      border-bottom: 1px solid #f4f4f4;
    }
    #works-table thead th {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 6px;
      text-align: left;
    }
    #works-table tbody tr { border-bottom: 1px solid #f4f4f4; }
    #works-table tbody td {
      padding: 2px 6px;
      vertical-align: top;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #works-table tbody td.col-title,
    #works-table tbody td.col-medium { white-space: normal; }

    .btn-action {
      font: normal 11px Arial, Helvetica, sans-serif;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 4px 0 0;
      color: #00f;
      text-decoration: underline;
    }
    .btn-action:hover { color: #551a8b; }
    .btn-action.del { color: #900; }
    .btn-action.del:hover { color: #f00; }

    /* ── Work form overlay ── */
    #form-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
    }
    #form-overlay.open { display: flex; align-items: center; justify-content: center; }

    #work-form-wrap {
      background: #fff;
      padding: 20px 24px;
      width: 480px;
      max-width: 96vw;
      box-sizing: border-box;
    }
    #work-form-wrap h2 { font-size: 12px; font-weight: bold; margin-bottom: 14px; }
    #work-form .field input[type="text"],
    #work-form .field input[type="number"],
    #work-form .field textarea {
      font: normal 12px Arial, Helvetica, sans-serif;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      padding: 3px 5px;
    }
    #work-form .field textarea { height: 80px; resize: vertical; }
    #form-actions { margin-top: 14px; display: flex; gap: 8px; }
    #form-actions button {
      font: normal 12px Arial, Helvetica, sans-serif;
      border: 1px solid #ccc;
      background: none;
      padding: 3px 12px;
      cursor: pointer;
    }
    #form-actions button:hover { background: #f4f4f4; }
    #form-error { color: red; font-size: 11px; margin-top: 6px; }

    #img-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .img-thumb-wrap {
      position: relative;
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }
    .img-thumb-wrap img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border: 1px solid #eee;
      display: block;
    }
    .img-thumb-remove {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      font-size: 12px;
      line-height: 16px;
      text-align: center;
      cursor: pointer;
      padding: 0;
    }
    .img-add-btn {
      width: 80px;
      height: 80px;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: #666;
      cursor: pointer;
      flex-shrink: 0;
      user-select: none;
    }
    .img-add-btn:hover { background: #d0d0d0; }
    #progress-wrap { margin-top: 6px; display: none; }
    #progress-text { font-size: 11px; color: #555; margin-bottom: 3px; }
    #progress-bar-track { width: 100%; background: #e8e8e8; height: 3px; }
    #progress-bar { height: 3px; background: #000; width: 0%; }
    #btn-save:disabled { opacity: 0.45; cursor: default; }

    button[type="submit"] { font-weight: bold; }

    @media (max-width: 680px) {
      /* Save Profile button row */
      #profile-form > div[style*="margin-top:10px"] {
        display: block !important;
        margin-top: 12px;
      }

      /* Work form modal: scrollable, capped height */
      #form-overlay.open {
        align-items: flex-start;
        overflow-y: auto;
        padding: 20px 0;
      }
      #work-form-wrap {
        max-height: 90vh;
        overflow-y: auto;
      }
    }
  </style>
</head>
<body>

<div id="page-header">
  <span id="site-name">Lee Doyub — Admin</span>
  <button id="btn-logout" style="display:none">Logout</button>
</div>

<!-- Login -->
<div id="login-section">
  <h2>Sign in</h2>
  <form id="login-form">
    <div class="field">
      <label for="input-email">Email</label>
      <input id="input-email" type="email" required autocomplete="username" />
    </div>
    <div class="field">
      <label for="input-password">Password</label>
      <input id="input-password" type="password" required autocomplete="current-password" />
    </div>
    <div class="field">
      <button type="submit">Sign in</button>
    </div>
    <div id="login-error"></div>
  </form>
</div>

<!-- Admin panel -->
<div id="admin-section">

  <!-- Profile -->
  <div class="admin-section-wrap">
    <div class="admin-section-heading collapsible" id="profile-heading">Profile &#9660;</div>
    <div id="profile-body">
    <form id="profile-form">
      <div class="field" style="margin-bottom:8px">
        <label for="p-bio">Bio</label>
        <textarea id="p-bio"></textarea>
      </div>
      <div class="field" style="margin-bottom:8px">
        <label for="p-phone">Phone</label>
        <input id="p-phone" type="text" />
      </div>
      <div class="field" style="margin-bottom:8px">
        <label for="p-email">Email</label>
        <input id="p-email" type="text" />
      </div>
      <div class="field" style="margin-bottom:8px">
        <label for="p-instagram">Instagram handle</label>
        <input id="p-instagram" type="text" placeholder="@handle" />
      </div>
      <div class="field" style="margin-bottom:6px">
        <label>Upcoming exhibitions</label>
        <div id="upcoming-list"></div>
        <button type="button" id="btn-add-upcoming" class="btn-small">+ Add exhibition</button>
      </div>
      <div style="margin-top:10px; display:flex; align-items:center; gap:8px;">
        <button type="submit" style="font:bold 12px Arial,Helvetica,sans-serif; border:1px solid #ccc; background:none; padding:3px 12px; cursor:pointer;">Save profile</button>
        <span id="profile-status"></span>
        <span id="profile-error"></span>
      </div>
    </form>
    </div>
  </div>

  <!-- Works -->
  <div class="admin-section-wrap">
    <div class="admin-section-heading">Works</div>
    <button id="btn-add">+ Add work</button>
    <table id="works-table">
      <colgroup>
        <col class="col-title">
        <col class="col-medium">
        <col class="col-size">
        <col class="col-year">
        <col class="col-actions">
      </colgroup>
      <thead>
        <tr>
          <th class="col-title">Title</th>
          <th class="col-medium">Medium</th>
          <th class="col-size">Size</th>
          <th class="col-year">Year</th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody id="works-body"></tbody>
    </table>
  </div>

</div>

<!-- Add / Edit work form overlay -->
<div id="form-overlay">
  <div id="work-form-wrap">
    <h2 id="form-title">Add work</h2>
    <form id="work-form">
      <div class="field">
        <label for="f-title">Title</label>
        <input id="f-title" type="text" required />
      </div>
      <div class="field">
        <label for="f-medium">Medium</label>
        <input id="f-medium" type="text" required />
      </div>
      <div class="field">
        <label for="f-size">Size</label>
        <input id="f-size" type="text" required />
      </div>
      <div class="field">
        <label for="f-year">Year</label>
        <input id="f-year" type="number" required min="1900" max="2100" />
      </div>
      <div class="field">
        <label for="f-description">Description</label>
        <textarea id="f-description" required></textarea>
      </div>
      <div class="field">
        <label>Images</label>
        <input id="f-image-hidden" type="file" accept="image/*" multiple style="display:none" />
        <div id="img-strip"></div>
        <div id="progress-wrap">
          <div id="progress-text"></div>
          <div id="progress-bar-track"><div id="progress-bar"></div></div>
        </div>
      </div>
      <div id="form-error"></div>
      <div id="form-actions">
        <button type="submit" id="btn-save">Save</button>
        <button type="button" id="btn-cancel">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-storage-compat.js"></script>

<script>
  var firebaseConfig = {
    apiKey: "AIzaSyDz7i5kALzgRrRFb-VkmpSlmGxnGJgxXp4",
    authDomain: "leedoyub-7224c.firebaseapp.com",
    projectId: "leedoyub-7224c",
    storageBucket: "leedoyub-7224c.firebasestorage.app",
    messagingSenderId: "49544284283",
    appId: "1:49544284283:web:7961d405632e375e7fbade"
  };

  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db = firebase.firestore();
  var storage = firebase.storage();

  var editingId = null;

  // ── Image strip state ────────────────────────────────────────────────────────
  var existingUrls         = [];  // display URLs already in Firestore
  var existingOriginalUrls = [];  // original URLs already in Firestore
  var pendingImages        = [];  // { file, objectUrl } — newly selected, not yet uploaded

  function setProgress(text, pct) {
    var wrap = document.getElementById("progress-wrap");
    wrap.style.display = text ? "block" : "none";
    document.getElementById("progress-text").textContent = text;
    if (pct >= 0) document.getElementById("progress-bar").style.width = pct + "%";
  }

  function renderImgStrip() {
    var strip = document.getElementById("img-strip");
    strip.innerHTML = "";

    existingUrls.forEach(function(url, i) {
      var wrap = document.createElement("div");
      wrap.className = "img-thumb-wrap";
      var img = document.createElement("img");
      img.src = url;
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "img-thumb-remove";
      btn.textContent = "\u00d7";
      btn.addEventListener("click", function() {
        existingUrls.splice(i, 1);
        renderImgStrip();
      });
      wrap.appendChild(img);
      wrap.appendChild(btn);
      strip.appendChild(wrap);
    });

    pendingImages.forEach(function(item, i) {
      var wrap = document.createElement("div");
      wrap.className = "img-thumb-wrap";
      var img = document.createElement("img");
      img.src = item.objectUrl;
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "img-thumb-remove";
      btn.textContent = "\u00d7";
      btn.addEventListener("click", function() {
        URL.revokeObjectURL(item.objectUrl);
        pendingImages.splice(i, 1);
        renderImgStrip();
      });
      wrap.appendChild(img);
      wrap.appendChild(btn);
      strip.appendChild(wrap);
    });

    var addTile = document.createElement("div");
    addTile.className = "img-add-btn";
    addTile.textContent = "+";
    addTile.addEventListener("click", function() {
      document.getElementById("f-image-hidden").click();
    });
    strip.appendChild(addTile);
  }

  document.getElementById("f-image-hidden").addEventListener("change", function() {
    Array.from(this.files).forEach(function(file) {
      pendingImages.push({ file: file, objectUrl: URL.createObjectURL(file) });
    });
    this.value = "";
    renderImgStrip();
  });

  // ── Auth state ──────────────────────────────────────────────────────────────
  auth.onAuthStateChanged(function(user) {
    if (user) {
      document.getElementById("login-section").style.display = "none";
      document.getElementById("admin-section").style.display = "block";
      document.getElementById("btn-logout").style.display = "";
      loadProfile();
      loadWorks();
    } else {
      document.getElementById("login-section").style.display = "";
      document.getElementById("admin-section").style.display = "none";
      document.getElementById("btn-logout").style.display = "none";
    }
  });

  // ── Login ───────────────────────────────────────────────────────────────────
  document.getElementById("login-form").addEventListener("submit", function(e) {
    e.preventDefault();
    document.getElementById("login-error").textContent = "";
    auth.signInWithEmailAndPassword(
      document.getElementById("input-email").value,
      document.getElementById("input-password").value
    ).catch(function(err) {
      document.getElementById("login-error").textContent = err.message;
    });
  });

  document.getElementById("btn-logout").addEventListener("click", function() {
    auth.signOut();
  });

  // ── Profile ─────────────────────────────────────────────────────────────────
  function loadProfile() {
    db.collection("profile").doc("main").get().then(function(doc) {
      var d = doc.exists ? doc.data() : {};
      document.getElementById("p-bio").value = d.bio || "";
      document.getElementById("p-phone").value = d.phone || "";
      document.getElementById("p-email").value = d.email || "";
      document.getElementById("p-instagram").value = d.instagram || "";
      var list = document.getElementById("upcoming-list");
      list.innerHTML = "";
      (d.upcoming || []).forEach(function(item) {
        addUpcomingRow(item.title, item.dateRange, item.venue);
      });
    });
  }

  function addUpcomingRow(title, dateRange, venue) {
    // Parse existing "DD.MM.YYYY — DD.MM.YYYY" back into two parts
    var fromVal = "", toVal = "";
    if (dateRange) {
      var parts = dateRange.split(" \u2014 ");
      fromVal = parts[0] ? parts[0].trim() : "";
      toVal   = parts[1] ? parts[1].trim() : "";
    }

    var row = document.createElement("div");
    row.className = "upcoming-row";
    row.innerHTML =
      '<input type="text" class="inp-title" placeholder="Title" value="' + esc(title || "") + '" />' +
      '<input type="text" class="inp-date-from" placeholder="From" readonly />' +
      '<input type="text" class="inp-date-to" placeholder="To" readonly />' +
      '<input type="text" class="inp-venue" placeholder="Venue" value="' + esc(venue || "") + '" />' +
      '<button type="button" class="btn-small del">Remove</button>';

    row.querySelector(".del").addEventListener("click", function() {
      row.parentNode.removeChild(row);
    });
    document.getElementById("upcoming-list").appendChild(row);

    flatpickr(row.querySelector(".inp-date-from"), {
      dateFormat: "d.m.Y",
      defaultDate: fromVal || null
    });
    flatpickr(row.querySelector(".inp-date-to"), {
      dateFormat: "d.m.Y",
      defaultDate: toVal || null
    });
  }

  document.getElementById("btn-add-upcoming").addEventListener("click", function() {
    addUpcomingRow("", "", "");
  });

  document.getElementById("profile-form").addEventListener("submit", function(e) {
    e.preventDefault();
    document.getElementById("profile-status").textContent = "";
    document.getElementById("profile-error").textContent = "";

    var upcoming = [];
    document.querySelectorAll("#upcoming-list .upcoming-row").forEach(function(row) {
      var from = row.querySelector(".inp-date-from").value.trim();
      var to   = row.querySelector(".inp-date-to").value.trim();
      var dateRange = (from && to) ? from + " \u2014 " + to : (from || to);
      upcoming.push({
        title:     row.querySelector(".inp-title").value.trim(),
        dateRange: dateRange,
        venue:     row.querySelector(".inp-venue").value.trim()
      });
    });

    var data = {
      bio:       document.getElementById("p-bio").value.trim(),
      phone:     document.getElementById("p-phone").value.trim(),
      email:     document.getElementById("p-email").value.trim(),
      instagram: document.getElementById("p-instagram").value.trim(),
      upcoming:  upcoming
    };

    db.collection("profile").doc("main").set(data).then(function() {
      document.getElementById("profile-status").textContent = "Saved.";
      setTimeout(function() {
        document.getElementById("profile-status").textContent = "";
      }, 2000);
    }).catch(function(err) {
      document.getElementById("profile-error").textContent = err.message;
    });
  });

  // ── Works ───────────────────────────────────────────────────────────────────
  function loadWorks() {
    db.collection("works").orderBy("year", "desc").get().then(function(snapshot) {
      var tbody = document.getElementById("works-body");
      tbody.innerHTML = "";
      snapshot.forEach(function(doc) {
        var d = doc.data();
        var tr = document.createElement("tr");
        tr.innerHTML =
          '<td class="col-title">' + esc(d.title || "") + '</td>' +
          '<td class="col-medium">' + esc(d.medium || "") + '</td>' +
          '<td class="col-size">' + esc(d.size || "") + '</td>' +
          '<td class="col-year">' + esc(String(d.year || "")) + '</td>' +
          '<td class="col-actions">' +
            '<button class="btn-action edit-btn" data-id="' + doc.id + '">Edit</button>' +
            '<button class="btn-action del delete-btn" data-id="' + doc.id + '">Delete</button>' +
          '</td>';
        tbody.appendChild(tr);
      });
      tbody.querySelectorAll(".edit-btn").forEach(function(btn) {
        btn.addEventListener("click", function() { openEdit(this.dataset.id); });
      });
      tbody.querySelectorAll(".delete-btn").forEach(function(btn) {
        btn.addEventListener("click", function() { deleteWork(this.dataset.id); });
      });
    });
  }

  // ── Add / Edit work form ─────────────────────────────────────────────────────
  document.getElementById("btn-add").addEventListener("click", function() {
    editingId = null;
    existingUrls = []; existingOriginalUrls = []; pendingImages = [];
    document.getElementById("form-title").textContent = "Add work";
    document.getElementById("work-form").reset();
    document.getElementById("form-error").textContent = "";
    setProgress("", -1);
    renderImgStrip();
    document.getElementById("form-overlay").classList.add("open");
  });

  document.getElementById("btn-cancel").addEventListener("click", closeForm);

  document.getElementById("form-overlay").addEventListener("click", function(e) {
    if (e.target === this) closeForm();
  });

  function closeForm() {
    document.getElementById("form-overlay").classList.remove("open");
    pendingImages.forEach(function(item) { URL.revokeObjectURL(item.objectUrl); });
    existingUrls = []; existingOriginalUrls = []; pendingImages = [];
    document.getElementById("img-strip").innerHTML = "";
    setProgress("", -1);
    document.getElementById("btn-save").disabled = false;
    editingId = null;
  }

  function openEdit(id) {
    db.collection("works").doc(id).get().then(function(doc) {
      if (!doc.exists) return;
      var d = doc.data();
      editingId = id;
      document.getElementById("form-title").textContent = "Edit work";
      document.getElementById("f-title").value = d.title || "";
      document.getElementById("f-medium").value = d.medium || "";
      document.getElementById("f-size").value = d.size || "";
      document.getElementById("f-year").value = d.year || "";
      document.getElementById("f-description").value = d.description || "";
      existingUrls         = (d.imageUrls || []).slice();
      existingOriginalUrls = (d.imageUrlsOriginal || []).slice();
      pendingImages        = [];
      setProgress("", -1);
      renderImgStrip();
      document.getElementById("form-error").textContent = "";
      document.getElementById("form-overlay").classList.add("open");
    });
  }

  document.getElementById("work-form").addEventListener("submit", function(e) {
    e.preventDefault();
    document.getElementById("form-error").textContent = "";

    var data = {
      title:       document.getElementById("f-title").value.trim(),
      medium:      document.getElementById("f-medium").value.trim(),
      size:        document.getElementById("f-size").value.trim(),
      year:        parseInt(document.getElementById("f-year").value, 10),
      description: document.getElementById("f-description").value.trim()
    };

    var displayOpts = { maxSizeMB: 0.1, maxWidthOrHeight: 1800, useWebWorker: true, initialQuality: 0.8 };
    var uploadedDisplayUrls   = [];
    var uploadedOriginalUrls  = [];
    var total = pendingImages.length;

    function saveDoc() {
      data.imageUrls         = existingUrls.concat(uploadedDisplayUrls);
      data.imageUrlsOriginal = existingOriginalUrls.concat(uploadedOriginalUrls);
      var promise = editingId
        ? db.collection("works").doc(editingId).set(data, { merge: true })
        : db.collection("works").add(Object.assign({ imageUrls: [], imageUrlsOriginal: [] }, data));
      promise.then(function() {
        setProgress("Done", 100);
        setTimeout(function() { closeForm(); loadWorks(); }, 700);
      }).catch(function(err) {
        document.getElementById("btn-save").disabled = false;
        document.getElementById("form-error").textContent = err.message;
      });
    }

    if (total === 0) { saveDoc(); return; }

    document.getElementById("btn-save").disabled = true;

    function uploadNext(i) {
      if (i >= total) { saveDoc(); return; }

      var file = pendingImages[i].file;
      var ts   = Date.now();
      var name = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");

      setProgress("Compressing " + (i + 1) + " / " + total + "...", -1);

      imageCompression(file, displayOpts).then(function(compressed) {

        // ── Upload display version ──
        var displayRef = storage.ref("works/display_" + ts + "_" + name);
        var displayTask = displayRef.put(compressed);

        displayTask.on("state_changed",
          function(snap) {
            var pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
            setProgress("Uploading " + (i + 1) + " / " + total + " images... " + pct + "%", pct);
          },
          function(err) {
            document.getElementById("btn-save").disabled = false;
            setProgress("", -1);
            document.getElementById("form-error").textContent = err.message;
          },
          function() {
            displayRef.getDownloadURL().then(function(displayUrl) {
              uploadedDisplayUrls.push(displayUrl);

              // ── Upload original version ──
              var origRef  = storage.ref("works/original_" + ts + "_" + name);
              var origTask = origRef.put(file);

              origTask.on("state_changed", null,
                function(err) {
                  document.getElementById("btn-save").disabled = false;
                  setProgress("", -1);
                  document.getElementById("form-error").textContent = err.message;
                },
                function() {
                  origRef.getDownloadURL().then(function(origUrl) {
                    uploadedOriginalUrls.push(origUrl);
                    setTimeout(function() { uploadNext(i + 1); }, 500);
                  });
                }
              );
            });
          }
        );

      }).catch(function(err) {
        document.getElementById("btn-save").disabled = false;
        setProgress("", -1);
        document.getElementById("form-error").textContent = err.message;
      });
    }

    uploadNext(0);
  });

  function deleteWork(id) {
    if (!confirm("Delete this work?")) return;
    db.collection("works").doc(id).delete().then(function() {
      loadWorks();
    }).catch(function(err) {
      alert("Error: " + err.message);
    });
  }

  // ── Profile section toggle ──────────────────────────────────────────────────
  document.getElementById("profile-heading").addEventListener("click", function() {
    var body = document.getElementById("profile-body");
    var open = body.style.display !== "none";
    body.style.display = open ? "none" : "block";
    this.innerHTML = open ? "Profile &#9658;" : "Profile &#9660;";
  });

  // ── Util ────────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
</script>
</body>
</html>
