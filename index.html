<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lee Doyub</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Times New Roman", Times, serif;
      font-size: 13px;
      color: #000;
      background: #fff;
      line-height: 1.3;
      margin: 8px;
    }

    a { color: #00f; }
    a:visited { color: #551a8b; }

    /* ── Header ── */
    #page-header {
      display: flex;
      align-items: baseline;
      margin-bottom: 2px;
    }

    #site-name {
      font-size: 14px;
      font-weight: bold;
      width: calc(100% / 3);
      flex-shrink: 0;
    }

    #search-input {
      font-family: "Times New Roman", Times, serif;
      font-size: 13px;
      border: none;
      border-radius: 0;
      padding: 1px 4px;
      flex: 1;
      background: #BBF3E7;
    }

    /* ── Works table ── */
    #works-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    #works-table colgroup col.col-index  { width: 30px; }
    #works-table colgroup col.col-title,
    #works-table colgroup col.col-medium,
    #works-table colgroup col.col-size   { width: auto; }
    #works-table colgroup col.col-year   { width: 60px; }

    #works-table thead tr {
      border-top: 1px solid #F4F4F4;
      border-bottom: 1px solid #F4F4F4;
    }

    #works-table thead th {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 1px 6px;
      text-align: left;
      vertical-align: bottom;
    }

    #works-table thead th.col-index {
      text-align: left;
      cursor: pointer;
      user-select: none;
    }

    /* data rows */
    #works-table tbody tr.work-row {
      cursor: pointer;
      border-bottom: 1px solid #F4F4F4;
    }

    #works-table tbody tr.work-row:hover {
      background: #f5f5f5;
    }

    #works-table tbody tr.work-row td {
      padding: 1px 6px;
      vertical-align: top;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #works-table tbody tr.work-row td.col-title {
      white-space: normal;
    }

    #works-table tbody tr.work-row td.col-index {
      color: #666;
      text-align: left;
    }

    /* ── Detail rows ── */
    tr.detail-row {
      display: none;
    }

    tr.detail-row.open {
      display: table-row;
    }

    tr.detail-row td {
      padding: 8px 8px 12px 36px;
      background: #f9f9f9;
      border-bottom: 1px solid #F4F4F4;
      white-space: normal;
    }

    .detail-inner {
      max-width: 640px;
      line-height: 1.5;
    }

    .detail-meta {
      font-size: 11px;
      color: #555;
      margin-top: 5px;
    }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      #header-gap { width: 20px; }

      #works-table colgroup col.col-medium,
      #works-table colgroup col.col-size { width: 0; }

      #works-table thead th.col-medium,
      #works-table thead th.col-size,
      #works-table tbody td.col-medium,
      #works-table tbody td.col-size {
        display: none;
      }
    }
  </style>
</head>
<body>

<div id="page-header">
  <span id="site-name">Lee Doyub</span><input id="search-input" type="search" placeholder="Search" />
</div>

<table id="works-table">
  <colgroup>
    <col class="col-index">
    <col class="col-title">
    <col class="col-medium">
    <col class="col-size">
    <col class="col-year">
  </colgroup>
  <thead>
    <tr>
      <th class="col-index" id="sort-btn" title="Sort by year">&#9660;</th>
      <th class="col-title">Title</th>
      <th class="col-medium">Medium</th>
      <th class="col-size">Size</th>
      <th class="col-year">Year</th>
    </tr>
  </thead>
  <tbody id="works-body"></tbody>
</table>

<script>
  var works = [
    {
      title: "On What Remains",
      medium: "Oil on canvas",
      size: "162 × 130 cm",
      year: 2025,
      desc: "A large canvas built up in successive layers of oil paint that visualize sediment and time. The absence of figures and the residue of objects fill the picture plane, prompting the viewer to imagine presences that are no longer there."
    },
    {
      title: "Untitled (Kitchen)",
      medium: "Acrylic and graphite on linen",
      size: "80 × 100 cm",
      year: 2025,
      desc: "The most mundane domestic space — a kitchen — is re-drawn with graphite line and acrylic wash. The placement of tools and angle of light suggest a specific hour without providing a definitive narrative."
    },
    {
      title: "Fold Marks",
      medium: "Charcoal on paper",
      size: "120 × 90 cm",
      year: 2024,
      desc: "A drawing that emphasises and re-composes the crease marks left after paper is folded and unfolded many times. The fold itself functions as a painterly act."
    },
    {
      title: "Window, 3 p.m.",
      medium: "Oil on canvas",
      size: "53 × 45.5 cm",
      year: 2024,
      desc: "A small painting recording how light passes through a window at a specific 3 p.m. Completed quickly, it attempts to fix an immediate sensory experience onto canvas."
    },
    {
      title: "Pile",
      medium: "Oil stick and oil paint on canvas",
      size: "200 × 150 cm",
      year: 2023,
      desc: "A pile of accumulated objects fills the entire picture plane. Thick oil-stick line and transparent layers of oil paint alternate to convey weight and density."
    },
    {
      title: "Night Inventory",
      medium: "Ink and watercolour on paper",
      size: "38 × 55 cm",
      year: 2023,
      desc: "A night-time drawing of objects in a room arranged as an inventory. The work focuses on silhouette and spatial relationship rather than minute description."
    },
    {
      title: "Shelf",
      medium: "Acrylic on canvas",
      size: "91 × 72.7 cm",
      year: 2022,
      desc: "Everyday objects on a shelf rendered in acrylic. The simplification of colour and flattening of form paradoxically amplifies the presence of each object."
    },
    {
      title: "Traces of Use",
      medium: "Mixed media on paper",
      size: "297 × 420 mm",
      year: 2021,
      desc: "One work from a series of drawings meticulously recording the wear marks left on surfaces of long-used objects. Pencil, ballpoint, and ink are combined."
    },
    {
      title: "Catalogue of a Room #3",
      medium: "Graphite on paper",
      size: "59.4 × 84.1 cm",
      year: 2020,
      desc: "The third work in a series cataloguing all objects in a specific room in graphite. Arranged as a pure list rather than by spatial position, the drawings generate a new sense of space."
    },
    {
      title: "First Studio",
      medium: "Oil on canvas",
      size: "145.5 × 112 cm",
      year: 2018,
      desc: "A large oil painting reconstructing the artist's first independent studio from memory. The emphasis is on the feeling and atmosphere experienced there, rather than accuracy."
    }
  ];

  var sortDesc = true; // default: newest first
  var allRows = [];

  function esc(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function buildTable() {
    var tbody = document.getElementById("works-body");
    tbody.innerHTML = "";
    allRows = [];

    var sorted = works.slice().sort(function(a, b) {
      return sortDesc ? b.year - a.year : a.year - b.year;
    });

    sorted.forEach(function(work, i) {
      var tr = document.createElement("tr");
      tr.className = "work-row";
      tr.innerHTML =
        '<td class="col-index">' + (i + 1) + '</td>' +
        '<td class="col-title">' + esc(work.title) + '</td>' +
        '<td class="col-medium">' + esc(work.medium) + '</td>' +
        '<td class="col-size">' + esc(work.size) + '</td>' +
        '<td class="col-year">' + esc(String(work.year)) + '</td>';

      var detail = document.createElement("tr");
      detail.className = "detail-row";
      detail.innerHTML =
        '<td colspan="5">' +
          '<div class="detail-inner">' +
            '<div>' + esc(work.desc) + '</div>' +
            '<div class="detail-meta">' +
              esc(work.medium) + ' &mdash; ' + esc(work.size) + ' &mdash; ' + esc(String(work.year)) +
            '</div>' +
          '</div>' +
        '</td>';

      tr.addEventListener("click", function() {
        var expanded = detail.classList.contains("open");
        document.querySelectorAll(".detail-row.open").forEach(function(d) {
          d.classList.remove("open");
        });
        if (!expanded) detail.classList.add("open");
      });

      tbody.appendChild(tr);
      tbody.appendChild(detail);
      allRows.push({ work: work, tr: tr, detail: detail });
    });
  }

  document.getElementById("sort-btn").addEventListener("click", function() {
    sortDesc = !sortDesc;
    this.innerHTML = sortDesc ? "&#9660;" : "&#9650;";
    buildTable();
    // re-apply search filter if active
    var q = document.getElementById("search-input").value.toLowerCase();
    if (q) filterRows(q);
  });

  document.getElementById("search-input").addEventListener("input", function() {
    filterRows(this.value.toLowerCase());
  });

  function filterRows(q) {
    allRows.forEach(function(row) {
      var text = [row.work.title, row.work.medium, row.work.size, String(row.work.year)].join(" ").toLowerCase();
      var hide = q && text.indexOf(q) === -1;
      row.tr.style.display = hide ? "none" : "";
      row.detail.style.display = hide ? "none" : "";
      if (hide) row.detail.classList.remove("open");
    });
  }

  buildTable();
</script>
</body>
</html>
