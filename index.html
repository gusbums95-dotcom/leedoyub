<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lee Doyub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      font: normal 13px / 1.4em Arial, Helvetica, sans-serif;
      color: #000000;
      margin: 8px;
      padding: 0px;
      background-color: #FFFFFF;
      overscroll-behavior: none;
    }

    a { color: #00f; }
    a:visited { color: #551a8b; }

    /* ── Sidebar inline panel ── */
    #site-name-wrap {
      width: 31%;
      flex-shrink: 0;
    }

    #sidebar {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      padding-left: 50px;
    }

    #sidebar.open {
      max-height: 600px;
    }

    #sidebar p {
      margin-bottom: 6px;
    }

    #sidebar .sb-section {
      margin-bottom: 14px;
    }

    #sidebar .sb-label {
      font-weight: bold;
    }

    /* ── Header ── */
    #page-header {
      display: flex;
      align-items: center;
      padding: 14px 0;
      margin-bottom: 2px;
    }

    #header-index-spacer {
      width: 50px;
      flex-shrink: 0;
    }

    #site-name {
      font-family: "Helvetica", Arial, sans-serif;
      font-size: 12px;
      font-weight: bold;
      flex-shrink: 0;
      cursor: pointer;
      text-decoration: none;
      color: #000;
      padding-left: 6px;
      transition: color 0.15s ease;
    }

    #site-name:hover {
      color: #888;
    }

    #search-input {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      border: none;
      border-radius: 0;
      padding: 0 3px;
      height: 14px;
      width: 12%;
      flex-shrink: 0;
      background: #BBF3E7;
    }

    /* ── Works table ── */
    #works-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    #works-table colgroup col.col-index  { width: 50px; }
    #works-table colgroup col.col-title   { width: 31%; }
    #works-table colgroup col.col-medium,
    #works-table colgroup col.col-size   { width: auto; }
    #works-table colgroup col.col-year   { width: 60px; }

    #works-table thead tr {
      border-top: 1px solid #F4F4F4;
      border-bottom: 1px solid #F4F4F4;
    }

    #works-table thead th {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 1px 6px;
      text-align: left;
      vertical-align: bottom;
      white-space: nowrap;
    }

    #works-table thead th.col-index {
      text-align: left;
      cursor: pointer;
      user-select: none;
    }

    #works-table tbody tr.work-row {
      cursor: pointer;
      border-bottom: 1px solid #F4F4F4;
    }

    #works-table tbody tr.work-row:hover {
      background: #f5f5f5;
    }

    #works-table tbody tr.work-row td {
      padding: 1px 6px;
      vertical-align: top;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #works-table tbody tr.work-row td.col-title,
    #works-table tbody tr.work-row td.col-medium {
      white-space: normal;
    }


    #works-table tbody tr.work-row td.col-index {
      color: #666;
      text-align: left;
    }

    /* ── Detail rows ── */
    tr.detail-row {
      display: none;
    }

    tr.detail-row.open {
      display: table-row;
    }

    tr.detail-row td {
      padding: 8px 8px 12px 6px;
      background: #f9f9f9;
      border-bottom: 1px solid #F4F4F4;
      white-space: normal;
    }

    .detail-inner {
      max-width: 640px;
      line-height: 1.5;
    }

    .detail-meta {
      font-size: 11px;
      color: #555;
      margin-top: 5px;
    }

    /* ── Thumbnail strip ── */
    .img-thumb-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
      margin-bottom: 4px;
    }
    .img-thumb-strip img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }
    .img-thumb-strip img.active { outline: 1px solid #aaa; }

    /* ── Inline expanded image ── */
    .img-expanded {
      display: none;
      margin-top: 8px;
    }
    .img-expanded.open { display: block; }
    .img-expanded img {
      max-width: 600px;
      display: block;
      margin: 0 auto;
    }
    .img-expanded-caption {
      font-size: 11px;
      color: #555;
      margin-top: 5px;
    }

    tr.work-row {
      cursor: pointer;
    }

    @media (max-width: 640px) {
      body { margin: 4px; }

      #page-header { padding: 8px 0; }

      #header-index-spacer { width: 24px; }

      #site-name { padding-left: 3px; }

      #search-input { width: 28%; }

      #sidebar { padding-left: 24px; }
      #sidebar.open { max-height: 900px; }

      #works-table { width: 100%; table-layout: fixed; }

      #works-table thead th,
      #works-table tbody td { padding: 2px 4px; font-size: 11px; word-break: break-word; overflow: hidden; text-overflow: ellipsis; }

      #works-table tbody td.col-title,
      #works-table tbody td.col-size { white-space: normal; }

      #works-table thead th { font-weight: normal; }
      #works-table thead th.col-title { font-weight: bold; }

      .img-expanded img { max-width: 100%; }
    }

    #sb-contact a {
      color: #AF1D1D;
      text-decoration: none;
    }
    #sb-contact a:hover {
      text-decoration: underline;
    }

    #sb-links a {
      color: #000;
      text-decoration: none;
    }
    #sb-links a:hover {
      text-decoration: underline;
    }

  </style>
</head>
<body>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-storage-compat.js"></script>

<div id="page-header">
  <span id="header-index-spacer"></span><span id="site-name-wrap"><a id="site-name" href="#" onclick="toggleSidebar(event)">Lee Doyub</a></span><input id="search-input" type="search" placeholder="Search" />
</div>

<div id="sidebar">
  <div class="sb-section" id="sb-bio"></div>
  <div class="sb-section" id="sb-contact"></div>
  <div class="sb-section" id="sb-links"></div>
  <div class="sb-section" id="sb-upcoming"></div>
</div>

<div id="works-table-wrap"><table id="works-table">
      <colgroup>
        <col class="col-index">
        <col class="col-title">
        <col class="col-medium">
        <col class="col-size">
        <col class="col-year">
      </colgroup>
      <thead>
        <tr>
          <th class="col-index" data-col="yearRank" style="cursor:pointer"></th>
          <th class="col-title" data-col="title" style="cursor:pointer">Title</th>
          <th class="col-medium" data-col="medium" style="cursor:pointer">Medium</th>
          <th class="col-size" data-col="size" style="cursor:pointer">Size</th>
          <th class="col-year" data-col="year" style="cursor:pointer">Year</th>
        </tr>
      </thead>
      <tbody id="works-body"></tbody>
    </table></div>

<script>
  var firebaseConfig = {
    apiKey: "AIzaSyDz7i5kALzgRrRFb-VkmpSlmGxnGJgxXp4",
    authDomain: "leedoyub-7224c.firebaseapp.com",
    projectId: "leedoyub-7224c",
    storageBucket: "leedoyub-7224c.firebasestorage.app",
    messagingSenderId: "49544284283",
    appId: "1:49544284283:web:7961d405632e375e7fbade"
  };
  firebase.initializeApp(firebaseConfig);
  var db = firebase.firestore();

  var works = [];
  var sortCol = "yearRank";
  var sortDesc = true;
  var allRows = [];

  var docTouchStartY = 0;
  var docTouchMoved = false;
  document.addEventListener("touchstart", function(e) {
    docTouchStartY = e.touches[0].clientY;
    docTouchMoved = false;
  }, { passive: true });
  document.addEventListener("touchmove", function(e) {
    if (Math.abs(e.touches[0].clientY - docTouchStartY) > 10) {
      docTouchMoved = true;
    }
  }, { passive: true });
  document.addEventListener("touchend", function() {
    if (docTouchMoved) {
      setTimeout(function() { docTouchMoved = false; }, 350);
    }
  }, { passive: true });

  function esc(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function toggleSidebar(e) {
    e.preventDefault();
    document.getElementById("sidebar").classList.toggle("open");
  }

  var colLabels = { yearRank: "", title: "Title", medium: "Medium", size: "Size", year: "Year" };

  function isMobile() {
    return window.innerWidth <= 640;
  }

  function updateColgroup() {
    var cg = document.querySelector("#works-table colgroup");
    if (isMobile()) {
      cg.innerHTML =
        '<col class="col-index" style="width:8%">' +
        '<col class="col-title" style="width:56%">' +
        '<col class="col-size" style="width:22%">' +
        '<col class="col-year" style="width:14%">';
    } else {
      cg.innerHTML =
        '<col class="col-index" style="width:50px">' +
        '<col class="col-title" style="width:31%">' +
        '<col class="col-medium">' +
        '<col class="col-size">' +
        '<col class="col-year" style="width:60px">';
    }
  }

  function updateThead() {
    var tr = document.querySelector("#works-table thead tr");
    if (isMobile()) {
      tr.innerHTML =
        '<th class="col-index" data-col="yearRank" style="cursor:pointer"></th>' +
        '<th class="col-title" data-col="title" style="cursor:pointer">Title</th>' +
        '<th class="col-size" data-col="size" style="cursor:pointer">Size</th>' +
        '<th class="col-year" data-col="year" style="cursor:pointer">Year</th>';
    } else {
      tr.innerHTML =
        '<th class="col-index" data-col="yearRank" style="cursor:pointer"></th>' +
        '<th class="col-title" data-col="title" style="cursor:pointer">Title</th>' +
        '<th class="col-medium" data-col="medium" style="cursor:pointer">Medium</th>' +
        '<th class="col-size" data-col="size" style="cursor:pointer">Size</th>' +
        '<th class="col-year" data-col="year" style="cursor:pointer">Year</th>';
    }
    attachTheadListeners();
  }

  function attachTheadListeners() {
    document.querySelectorAll("#works-table thead th[data-col]").forEach(function(th) {
      th.addEventListener("click", function() {
        var col = this.getAttribute("data-col");
        if (sortCol === col) {
          sortDesc = !sortDesc;
        } else {
          sortCol = col;
          sortDesc = true;
        }
        updateHeaders();
        buildTable();
        var q = document.getElementById("search-input").value.toLowerCase();
        if (q) filterRows(q);
      });
    });
  }

  function updateHeaders() {
    document.querySelectorAll("#works-table thead th[data-col]").forEach(function(th) {
      var col = th.getAttribute("data-col");
      var label = colLabels[col];
      th.innerHTML = (col === sortCol) ? label + " " + (sortDesc ? "&#9660;" : "&#9650;") : label;
    });
  }

  function renderTable() {
    updateColgroup();
    updateThead();
    updateHeaders();
    buildTable();
    var q = document.getElementById("search-input").value.toLowerCase();
    if (q) filterRows(q);
  }

  function buildTable() {
    var tbody = document.getElementById("works-body");
    tbody.innerHTML = "";
    allRows = [];

    var sorted = works.slice().sort(function(a, b) {
      if (!sortCol) return 0;
      var cmp;
      if (sortCol === "yearRank" || sortCol === "year") {
        cmp = a[sortCol] - b[sortCol];
      } else {
        var av = (a[sortCol] || "").toLowerCase();
        var bv = (b[sortCol] || "").toLowerCase();
        cmp = av < bv ? -1 : av > bv ? 1 : 0;
      }
      return sortDesc ? -cmp : cmp;
    });

    var mobile = isMobile();
    sorted.forEach(function(work) {
      var tr = document.createElement("tr");
      tr.className = "work-row";
      tr.innerHTML =
        '<td class="col-index">' + work.yearRank + '</td>' +
        '<td class="col-title">' + esc(work.title) + '</td>' +
        (mobile ? '' : '<td class="col-medium">' + esc(work.medium) + '</td>') +
        '<td class="col-size" data-cm="' + esc(work.size) + '" data-unit="cm">' + esc(work.size) + '</td>' +
        '<td class="col-year">' + esc(String(work.year)) + '</td>';

      var detail = document.createElement("tr");
      detail.className = "detail-row";
      var caption = esc(work.medium) + ' &mdash; ' + esc(work.size) + ' &mdash; ' + esc(String(work.year));
      detail.innerHTML =
        '<td colspan="' + (mobile ? 4 : 5) + '">' +
          '<div class="detail-inner">' +
            '<div>' + esc(work.description) + '</div>' +
            '<div class="detail-meta">' + caption + '</div>' +
            '<div class="img-thumb-strip"></div>' +
          '</div>' +
          '<div class="img-expanded">' +
            '<img src="" alt="' + esc(work.title) + '" />' +
          '</div>' +
        '</td>';

      if (work.imageUrls && work.imageUrls.length) {
        var strip    = detail.querySelector(".img-thumb-strip");
        var expanded = detail.querySelector(".img-expanded");
        var bigImg   = expanded.querySelector("img");

        work.imageUrls.forEach(function(url, idx) {
          var thumb = document.createElement("img");
          thumb.src = url;
          thumb.alt = work.title;
          thumb.addEventListener("click", function(e) {
            e.stopPropagation();
            var alreadyOpen = expanded.classList.contains("open") && bigImg.src === url;
            // Deactivate all thumbs
            strip.querySelectorAll("img").forEach(function(t) { t.classList.remove("active"); });
            if (alreadyOpen) {
              expanded.classList.remove("open");
            } else {
              bigImg.src = url;
              expanded.classList.add("open");
              thumb.classList.add("active");
            }
          });
          strip.appendChild(thumb);
        });
      }

      tr.addEventListener("click", function() {
        if (docTouchMoved) return;
        detail.classList.toggle("open");
        if (!detail.classList.contains("open")) {
          var exp = detail.querySelector(".img-expanded");
          if (exp) { exp.classList.remove("open"); }
          var thumbs = detail.querySelectorAll(".img-thumb-strip img");
          thumbs.forEach(function(t) { t.classList.remove("active"); });
        }
      });

      tr.querySelector("td.col-size").addEventListener("click", function(e) {
        e.stopPropagation();
        var td = this;
        if (td.dataset.unit === "cm") {
          var orig = td.dataset.cm;
          var unit, mult;
          if (/mm/.test(orig))         { unit = "mm"; mult = 1 / 25.4; }
          else if (/\bm\b/.test(orig)) { unit = "m";  mult = 39.3701; }
          else                         { unit = "cm"; mult = 1 / 2.54; }
          var converted = orig
            .replace(/[\d.]+/g, function(n) {
              return Math.round(parseFloat(n) * mult * 10) / 10;
            })
            .replace(new RegExp(unit, "g"), "in");
          td.textContent = converted;
          td.dataset.unit = "in";
        } else {
          td.textContent = td.dataset.cm;
          td.dataset.unit = "cm";
        }
      });

      tbody.appendChild(tr);
      tbody.appendChild(detail);
      allRows.push({ work: work, tr: tr, detail: detail });
    });
  }

  document.getElementById("search-input").addEventListener("input", function() {
    filterRows(this.value.toLowerCase());
  });

  function filterRows(q) {
    allRows.forEach(function(row) {
      var text = [row.work.title, row.work.medium, row.work.size, String(row.work.year)].join(" ").toLowerCase();
      var hide = q && text.indexOf(q) === -1;
      row.tr.style.display = hide ? "none" : "";
      row.detail.style.display = hide ? "none" : "";
      if (hide) row.detail.classList.remove("open");
    });
  }

  // Load profile from Firestore
  db.collection("profile").doc("main").get().then(function(doc) {
    var d = doc.exists ? doc.data() : {};

    // Bio
    var bio = (d.bio || "").trim();
    if (bio) {
      document.getElementById("sb-bio").innerHTML = "<p>" + esc(bio) + "</p>";
    }

    // Contact
    var phone     = (d.phone || "").trim();
    var email     = (d.email || "").trim();
    var instagram = (d.instagram || "").trim();
    var contactHtml = "";
    if (phone)     contactHtml += '<p>Tel. <a href="tel:' + esc(phone.replace(/\s/g, "")) + '">' + esc(phone) + '</a></p>';
    if (email)     contactHtml += '<p>Email <a href="mailto:' + esc(email) + '">' + esc(email) + '</a></p>';
    if (instagram) {
      var handle = instagram.replace(/^@/, "");
      contactHtml += '<p>Instagram <a href="https://instagram.com/' + esc(handle) + '" target="_blank" rel="noopener">' + esc(instagram) + '</a></p>';
    }
    if (contactHtml) {
      document.getElementById("sb-contact").innerHTML = contactHtml;
    }

    // Other links
    var otherLinks = d.otherLinks || [];
    if (otherLinks.length) {
      var linksHtml = '<p>Other links: ';
      otherLinks.forEach(function(link, i) {
        if (i > 0) linksHtml += '&nbsp;&nbsp;';
        linksHtml += esc(link.name) + ' <a href="' + esc(link.url) + '" target="_blank" rel="noopener">📎</a>';
      });
      linksHtml += '</p>';
      document.getElementById("sb-links").innerHTML = linksHtml;
    }

    // Upcoming
    var upcoming = d.upcoming || [];
    if (upcoming.length) {
      var html = '<p><span class="sb-label">Upcoming</span></p>';
      upcoming.forEach(function(item, i) {
        if (i > 0) html += "<br>";
        html += "<p>";
        if (item.title)     html += "<em>" + esc(item.title) + "</em><br>";
        if (item.dateRange) html += esc(item.dateRange) + "<br>";
        if (item.venue)     html += esc(item.venue);
        html += "</p>";
      });
      document.getElementById("sb-upcoming").innerHTML = html;
    }
  });

  // Load works from Firestore
  db.collection("works").get().then(function(snapshot) {
    works = [];
    snapshot.forEach(function(doc) {
      var d = doc.data();
      works.push({
        id: doc.id,
        title: d.title || "",
        medium: d.medium || "",
        size: d.size || "",
        year: d.year || 0,
        description: d.description || "",
        imageUrls: d.imageUrls || []
      });
    });

    // Assign yearRank: 1 = oldest, N = newest
    var byYear = works.slice().sort(function(a, b) { return a.year - b.year; });
    byYear.forEach(function(w, i) { w.yearRank = i + 1; });

    renderTable();
  });

  var resizeTimer;
  window.addEventListener("resize", function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderTable, 150);
  });
</script>
</body>
</html>
